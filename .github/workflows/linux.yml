name: Linux
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Runner specs
        run: |
          nproc
          free -h
          cat /proc/cpuinfo | grep "model name" | head -1
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Restore models cache
        id: cache-models
        uses: actions/cache/restore@v4
        with:
          path: ~/.kronk/models
          key: ${{ runner.os }}-models-v3
      - name: Install kronk command
        run: go install ./cmd/kronk
      - name: Install Libs
        run: |
          mkdir -p $HOME/.kronk/libraries
          kronk libs --local
      - name: Download test models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.kronk/models
          kronk model pull --local ggml-org/Qwen2.5-VL-3B-Instruct-GGUF/Qwen2.5-VL-3B-Instruct-Q8_0.gguf ggml-org/Qwen2.5-VL-3B-Instruct-GGUF/mmproj-Qwen2.5-VL-3B-Instruct-Q8_0.gguf
          kronk model pull --local Qwen/Qwen3-8B-GGUF/Qwen3-8B-Q8_0.gguf
          kronk model pull --local ggml-org/embeddinggemma-300m-qat-q8_0-GGUF/embeddinggemma-300m-qat-Q8_0.gguf
          kronk model pull --local gpustack/bge-reranker-v2-m3-GGUF/bge-reranker-v2-m3-Q8_0.gguf
      - name: Install static analysis tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run api/service tests
        timeout-minutes: 30
        run: |
          export RUN_IN_PARALLEL=no
          go test -v -count=1 -timeout 30m ./cmd/server/api/services/kronk/tests
      - name: Run sdk/cache tests
        run: |
          export RUN_IN_PARALLEL=no
          go test -v -count=1 ./cmd/server/app/sdk/cache
      - name: Run sdk/security tests
        run: |
          export RUN_IN_PARALLEL=no
          go test -v -count=1 ./cmd/server/app/sdk/security/...
      - name: Run kronk model tests
        run: |
          export RUN_IN_PARALLEL=no
          go test -v -count=1 ./sdk/kronk/model
      - name: Run sdk/tools tests
        run: |
          export RUN_IN_PARALLEL=no
          go test -v -count=1 ./sdk/tools/...
      - name: Run vet, linter, vuln, diff checks
        run: |
          go vet ./...
          staticcheck -checks=all ./...
          govulncheck ./...
          go fix -diff ./...
      - name: Delete existing models cache
        if: github.ref == 'refs/heads/main' && steps.cache-models.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh cache delete "${{ runner.os }}-models-v3" --repo ${{ github.repository }} || true
      - name: Save models cache
        if: github.ref == 'refs/heads/main' && steps.cache-models.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.kronk/models
          key: ${{ runner.os }}-models-v3
